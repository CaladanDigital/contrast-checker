<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | accessibilitycolor.com</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f7f8fc; color: #333;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 2rem;
    }
    .container { max-width: 420px; }
    h1 {
      font-size: 5rem; font-weight: 800; color: #0066cc;
      line-height: 1; margin-bottom: 1rem;
    }
    h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.75rem; color: #222; }
    p { font-size: 1rem; color: #666; line-height: 1.6; margin-bottom: 2rem; }
    a {
      display: inline-block; background: #0066cc; color: #fff;
      padding: 0.75rem 2rem; border-radius: 10px;
      font-weight: 600; text-decoration: none;
      transition: background 0.2s ease;
    }
    a:hover { background: #0052a3; }
    .brand {
      margin-top: 3rem; font-size: 0.85rem; color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Back to Color Checker</a>
    <div class="brand">accessibilitycolor.com</div>
  </div>
</body>
</html>
